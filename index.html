<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convidados - Listas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lista de Convidados</h1>
    </header>
    
    <main>
        <section id="list-maiusculas">
            <h2>1. Nomes em Maiúsculas</h2>
            <ul id="maiusculas"></ul>
        </section>

        <section id="list-com-A">
            <h2>2. Nomes que começam com 'A'</h2>
            <ul id="com-a"></ul>
        </section>

        <section id="list-longos">
            <h2>3. Nomes com mais de 5 Letras</h2>
            <ul id="longos"></ul>
        </section>
        
        <footer>
            <p id="total-a"></p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
